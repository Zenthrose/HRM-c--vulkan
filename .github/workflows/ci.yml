name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        compiler: [gcc, clang]
        exclude:
          - os: windows-latest
            compiler: clang
        include:
          - os: windows-latest
            compiler: msvc

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Vulkan SDK (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.296-jammy.list https://packages.lunarg.com/vulkan/1.3.296/lunarg-vulkan-1.3.296-jammy.list
        sudo apt update
        sudo apt install -y vulkan-sdk

    - name: Install Vulkan SDK (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install molten-vk

    - name: Install Vulkan SDK (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install vulkan-sdk

    - name: Set up GCC (Linux/macOS)
      if: matrix.compiler == 'gcc' && runner.os != 'Windows'
      run: |
        sudo apt update
        sudo apt install -y g++ cmake ninja-build

    - name: Set up Clang (Linux/macOS)
      if: matrix.compiler == 'clang' && runner.os != 'Windows'
      run: |
        sudo apt update
        sudo apt install -y clang cmake ninja-build

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G Ninja

    - name: Build
      run: |
        cd build
        ninja

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure